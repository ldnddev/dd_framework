<title>dd-slider demo - dd-framework</title>
<link rel="stylesheet" href="/assets/css/style.min.css">
<style>
  body{margin:0;padding:0}

<body class="dd-g">
<main aria-label="dd-slider live example">
<div class="dd-slider">
  <div class="dd-slider__title">
    <h2>Slider title</h2>

    <li class="dd-slider__item data-id="uid_0001">

            <div class="dd-slider__title">
              Slide item title
            </div>

                </div>
                <div class="dd-slider__link">

                </div>
              </div>
            </div>
          </div>
          <!-- End body -->
          <!-- Start image or video -->
          <div class="dd-slider__image dd-u-1-1 dd-u-sm-1-1 dd-u-md-1-1 dd-u-lg-12-24">
            <img
