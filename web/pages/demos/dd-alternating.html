<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dd-alternating demo - dd-framework</title>
<link rel="stylesheet" href="/assets/css/style.min.css">
<style>
  body{margin:0;padding:0}
  /* Demo isolation: each iframe is its own document, so headings here are scoped locally. */
</style>
</head>
<body class="dd-g">
<main aria-label="dd-alternating live example">
<div class="dd-alternating" role="region">
  <div class="dd-alternating__items dd-g">
    <div class="dd-alternating__item dd-u-1-1">
      <div class="dd-alternating__content dd-g">
        <div
          class="dd-alternating__image dd-u-1-1 dd-u-sm-1-1 dd-u-md-1-1 dd-u-lg-12-24"
          data-aos="fade-up"
        >
          <img
            src="https://dummyimage.com/600x400/000/fff"
            class="dd-img"
            alt=""
          />
        </div>
        <div
          class="dd-alternating__copy l-box dd-u-1-1 dd-u-sm-1-1 dd-u-md-1-1 dd-u-lg-12-24"
          data-aos="fade-up"
        >
          <div class="dd-alternating__title">
            <h2>Alternating title</h2>
          </div>
          <div class="dd-alternating__body">
            <p>Alternating body copy</p>
            <div class="dd-alternating__links">
              <div class="dd-alternating__link">
                <a href="#" class="dd-button -primary">Alternating Link 1</a>
              </div>
              <div class="dd-alternating__link">
                <a href="#" class="dd-button -ghost">Alternating Link 2</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="dd-alternating__item dd-u-1-1">
      <div class="dd-alternating__content dd-g">
        <div
          class="dd-alternating__image dd-u-1-1 dd-u-sm-1-1 dd-u-md-1-1 dd-u-lg-12-24"
          data-aos="fade-up"
        >
          <img
            src="https://dummyimage.com/600x400/000/fff"
            class="dd-img"
            alt=""
          />
        </div>
        <div
          class="dd-alternating__copy l-box dd-u-1-1 dd-u-sm-1-1 dd-u-md-1-1 dd-u-lg-12-24"
          data-aos="fade-up"
        >
          <div class="dd-alternating__title">
            <h2>Alternating title</h2>
          </div>
          <div class="dd-alternating__body">
            <p>Alternating body copy</p>
            <div class="dd-alternating__links">
              <div class="dd-alternating__link">
                <a href="#" class="dd-button -primary">Alternating Link 1</a>
              </div>
              <div class="dd-alternating__link">
                <a href="#" class="dd-button -ghost">Alternating Link 2</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</main>
</body>
</html>
