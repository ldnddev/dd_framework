<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dd-modal demo - dd-framework</title>
<link rel="stylesheet" href="/assets/css/style.min.css">
<style>
  body{margin:0;padding:0}
  /* Demo isolation: each iframe is its own document, so headings here are scoped locally. */
</style>
</head>
<body class="dd-g">
<main aria-label="dd-modal live example">
<button data-modal-open data-id="example-modal">Open Modal</button>
<dialog data-modal id="example-modal" class="dd-modal">
  <button data-modal-close data-id="example-modal" aria-label="close modal window">X</button>
  <div class="dd-modal__content">
    <p>Modal content here.</p>
  </div>
</dialog>

</main>
</body>
</html>
