<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dd-cookie-consent demo - dd-framework</title>
<link rel="stylesheet" href="/assets/css/style.min.css">
<style>
  body{margin:0;padding:0}
  /* Demo isolation: each iframe is its own document, so headings here are scoped locally. */
</style>
</head>
<body class="dd-g">
<main aria-label="dd-cookie-consent live example">
<!-- remove hx-on if not using htmx -->
<div id="cookie-consent" style="display: none;" class="l-box" hx-on::after-request="dd_cookie_consent()">
  <p>We use cookies to enhance your experience. Do you consent to Google tracking?</p>
  <button class="accept dd-button" onclick="handleCookieConsent('accept')">Accept</button>
  <button class="decline dd-button-secondary" onclick="handleCookieConsent('decline')">Decline</button>
</div>

</main>
</body>
</html>
